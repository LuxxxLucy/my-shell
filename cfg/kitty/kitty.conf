# Kitty config

# Font
font_family        Comic Code Ligatures Medium
italic_font        Comic Code Ligatures Medium Italic
bold_font          Berkeley Mono Bold
bold_italic_font   Berkeley Mono Bold Italic
font_size          21.0
modify_font        cell_height 102%
# gamma, contrast% — make it with bolder/thickened glyphs
text_composition_strategy 1.7 30
# Nerd Font icons for the prompt
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B7,U+E700-U+E8EF,U+EA60-U+EC1E,U+ED00-U+EFCE,U+F000-U+F2FF,U+F300-U+F381,U+F400-U+F533,U+F0001-U+F1AF0 Symbols Nerd Font Mono

# Window
window_padding_width  1 2
background_opacity    1.1

# Cursor
cursor_shape          block
cursor_blink_interval 3
