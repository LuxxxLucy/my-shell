# =============================================================================
# General
# =============================================================================

# Shell
set-option -g default-shell /bin/zsh
set -g default-command "/bin/zsh"

# Enable mouse support
set -g mouse on

# No delay for escape key (better for vim)
set -sg escape-time 0

# Turn off bells
set -g bell-action none

# Extended keys On
set -g extended-keys on

# Large scrollback history
setw -g history-limit 50000000

# Automatically set window / terminal titles
set-window-option -g automatic-rename on
set-option -g set-titles on

# Start window indices at 1, pane indices at 0
set -g base-index 1
set -g pane-base-index 0

# True color
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# =============================================================================
# Prefix
# =============================================================================

# Set prefix to Ctrl + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =============================================================================
# Key bindings
# =============================================================================

# Split panes with | and - instead of " and % (keep current path)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move between panes with hjkl, vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Switch panes with Alt + arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows with Shift + arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Prefix + Up/Down to swap the current window left/right in the window list
bind Up   swap-window -t -1 \; previous-window
bind Down swap-window -t +1 \; next-window

# Prefix + . to rename the current pane (pairs with prefix , for windows)
bind . command-prompt -p "Rename pane" -I "#{pane_title}" "select-pane -T '%%'"

# Prefix + / to search the scrollback
bind-key / copy-mode \; send-key ?

# Prefix + e to edit this config in nvim and reload on quit
unbind e
bind e new-window -n '~/.tmux.conf' "sh -c 'nvim ~/.tmux.conf && tmux source ~/.tmux.conf'"

# Prefix + r to reload this config
unbind r
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config'

# Popup windows
bind M-g display-popup -E "ta ~/git"
bind g   display-popup -E "tmux new-session -A -s scratch"

# =============================================================================
# Status line
# =============================================================================

set-option -g status "on"

# Refresh every 5 seconds - good for when music is playing / time updates
set -g status-interval 5

# Status line length
set -g status-left-length 30
set -g status-right-length 150

# Status bar color
set-option -g status-style bg=colour237,fg=colour223 # bg=bg1, fg=fg1

# Window list entries
set-window-option -g window-status-format '#I: #{pane_title} #F'
set-window-option -g window-status-style bg=colour214,fg=colour237          # bg=yellow, fg=bg1
set-window-option -g window-status-current-style bg=red,fg=colour237        # fg=bg1
set-window-option -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3
set-window-option -g window-status-bell-style bg=colour167,fg=colour235     # bg=red, fg=bg

# Command / message line
set-option -g message-style bg=colour239,fg=colour223         # bg=bg2, fg=fg1
set-option -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# display-panes (prefix + q) colors
set-option -g display-panes-active-colour colour1   # fg2
set-option -g display-panes-colour colour237        # bg1

# Clock
set-window-option -g clock-mode-colour colour109 # blue

# =============================================================================
# Pane borders
# =============================================================================

set-option -g pane-active-border-style fg=colour214
set-option -g pane-border-style fg=colour239

# Show pane titles as a full-width bar on the top border
set-option -g pane-border-status top
# We use #{s/...} to strip a leading non-ASCII glyph
set-option -g pane-border-format '#[align=left fill=colour239]#{?pane_active,#[fg=colour237 bg=colour214 bold] #P #[fg=colour214 bg=colour239 nobold],#[fg=colour237 bg=colour245 bold] #P #[fg=colour245 bg=colour239 nobold]}#[fg=colour223 bg=colour239] #{s/^[^ -~]+ *//:pane_title}'

# =============================================================================
# Plugins (TPM)
# =============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# auto reload tmux configuration
set-option -g @plugin 'b0o/tmux-autoreload'

# restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

## Restore Vim sessions
set -g @resurrect-strategy-vim 'session'
## Restore Neovim sessions
set -g @resurrect-strategy-nvim 'session'
## Restore Panes
set -g @resurrect-capture-pane-contents 'on'
## Restore last saved environment (automatically)
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-save-interval '5'
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux

# pop-up menu. binding key is prefix + \

set -g @plugin 'jaclu/tmux-menus'
set -g @menus_location_x 'C'
set -g @menus_location_y 'C'
set -g @menus_config_overrides 1

set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '-w 100% -h 50% --multi -0 --no-preview --no-border'
set -g @plugin 'wfxr/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m --border=none"

# Note: Change the plugin order carefully!
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'gold'
set -g @tmux_power_date_icon ' '
set -g @tmux_power_time_icon ' '
set -g @tmux_power_user_icon ' '
set -g @tmux_power_session_icon ' '
set -g @tmux_power_show_upload_speed    true
set -g @tmux_power_show_download_speed  true
set -g @tmux_power_show_web_reachable   true
# / / / /
set -g @tmux_power_upload_speed_icon    '-'
set -g @tmux_power_download_speed_icon  '-'
set -g @tmux_power_prefix_highlight_pos 'LR'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt   'Copy'
set -g @prefix_highlight_sync_prompt   'Sync'

set -g @plugin 'wfxr/tmux-web-reachable'
set -g @web_reachable_url        'https://google.com'
set -g @web_reachable_thresholds '500 750'
# set -g @web_reachable_symbols '🔵|🟢|🟡|🔴'
# set -g @web_reachable_symbols '🔵|🟢|🟡|🧱'
set -g @web_reachable_symbols '#[fg=Cyan] #[]|#[fg=Green] #[]|#[fg=Yellow] #[]|#[fg=Red] #[]'
set -g @plugin 'wfxr/tmux-net-speed'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
