name: setup-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Full setup on both OS families: macOS (brew) and Ubuntu (apt). Catches
  # script bugs, package renames, missing deps, and bootstrap failures — but
  # not a truly virgin machine (runners come with toolchains pre-installed).
  full:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run setup.sh (full)
        run: ./setup.sh
      - name: Verify symlinks
        run: |
          for f in ~/.zshrc ~/.tmux.conf ~/.gitconfig ~/.githelpers ~/.config/nvim/init.vim; do
            [ -L "$f" ] || { echo "MISSING SYMLINK: $f"; exit 1; }
            echo "OK $f -> $(readlink "$f")"
          done
      - name: Verify key binaries on PATH after .zshrc loads
        run: zsh -ic 'for c in eza zoxide fzf lazygit gh node uv claude; do command -v "$c" >/dev/null && echo "OK $c" || echo "MISSING $c"; done'

  # Bare setup: minimal deps only, both OS families.
  bare:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run setup.sh --bare
        run: ./setup.sh --bare
      - name: Verify symlinks point at *.bare variants
        run: |
          for f in ~/.zshrc ~/.tmux.conf ~/.config/nvim/init.vim; do
            [ -L "$f" ] || { echo "MISSING SYMLINK: $f"; exit 1; }
            target=$(readlink "$f")
            case "$target" in
                *.bare|*init-bare.vim) echo "OK $f -> $target" ;;
                *) echo "WRONG TARGET: $f -> $target"; exit 1 ;;
            esac
          done
      - name: Verify bare binaries
        run: zsh -ic 'for c in git git-lfs tmux nvim; do command -v "$c" >/dev/null && echo "OK $c" || { echo "MISSING $c"; exit 1; }; done'

  # No-install path: only re-link configs. Regression test for the symlink
  # phase in isolation, on both OS families.
  no-install:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run setup.sh --no-install
        run: ./setup.sh --no-install
